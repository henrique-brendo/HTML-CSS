<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <H1>Exemplo de Formulário</H1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="icor">cor:</label>
            <input type="color" id="icor" name="cor" value="#FF0000">
        </p>
        <p>
            <label for="inivel">nível de satisfação:</label>
            <input type="range" id="inivel" name="nivel" min="0" max="10" value="9">
        </p>
        <p>
            <label for="ifoto">foto do perfil</label>
            <input type="file" id="ifoto" name="foto" accept="image/*">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
