<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on" >
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="isxmasc" value="masculino">
            <label for="isxmasc">Masculino</label required><br>
            <input type="radio" name="sexo" id="isxfem" value="feminino">
            <label for="isxfem">Feminino</label required>
        </fieldset>
        <fieldset>
            <legend>Jogos</legend>
            <input type="checkbox" name="lol" id="ilol" value="League of Legends">
            <label for="ilol">League of Legends</label><br>
            <input type="checkbox" name="csgo" id="icsgo" value="Counter-Strike: Global Offensive">
            <label for="icsgo">Counter-Strike: Global Offensive</label><br>
            <input type="checkbox" name="valorant" id="ivalorant" value="Valorant">
            <label for="ivalorant">Valorant</label><br>
            <input type="checkbox" name="Deadlock" id="ideadlock" value="Deadlock">
            <label for="ideadlock">Deadlock</label>
        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body> 
</html>
